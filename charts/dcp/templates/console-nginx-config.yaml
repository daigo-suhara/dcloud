apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dcp.fullname" . }}-console-nginx
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        proxy_pass http://{{ include "dcp.fullname" . }}-core:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }

      location /cloudrun/ {
        proxy_pass http://{{ include "dcp.fullname" . }}-core:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }

      location /services/ {
        proxy_pass http://{{ include "dcp.fullname" . }}-core:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }

      location = /keycloak {
        return 301 /keycloak/;
      }

      location /keycloak/ {
        proxy_pass http://{{ include "dcp.fullname" . }}-keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }
    }

    {{- if .Values.console.publicServiceDomain }}
    server {
      listen 8080;
      server_name ~^(?<service>[a-z0-9-]+)\.{{ .Values.console.publicServiceDomain | replace "." "\\." }}$;

      location / {
        proxy_pass http://{{ include "dcp.fullname" . }}-core:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }
    }
    {{- end }}
