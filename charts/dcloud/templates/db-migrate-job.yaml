apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dcloud.fullname" . }}-db-migrate
  labels:
    {{- include "dcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrate
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "dcloud.labels" . | nindent 8 }}
        app.kubernetes.io/component: db-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: {{ include "dcloud.image" (dict "root" . "repository" "db-migrate") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "dcloud.fullname" . }}-database
