apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "dcloud.fullname" . }}-database
  labels:
    {{- include "dcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  encryptedData:
    DCLD_DATABASE_MIGRATION_URL: 
    DCLD_DATABASE_URL: 
    password: 
    postgres-password: 
    repmgr-password: 
  template:
    metadata:
      name: {{ include "dcloud.fullname" . }}-database
      labels:
        {{- include "dcloud.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
    type: Opaque
